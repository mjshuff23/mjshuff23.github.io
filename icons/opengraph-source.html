<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Michael Shuff Open Graph</title>
    <style>
      :root {
        --bg: #07101f;
        --bg2: #0b1629;
        --panel: rgba(11, 24, 44, 0.78);
        --line: rgba(0, 214, 255, 0.14);
        --cyan: #10e7ff;
        --cyan-soft: #00b9ff;
        --text: #f4f7fb;
        --muted: #99adc8;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        min-width: 1200px;
        height: 100%;
        min-height: 630px;
        overflow: hidden;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 229, 255, 0.12), transparent 28%),
          radial-gradient(circle at 80% 70%, rgba(0, 153, 255, 0.14), transparent 26%),
          linear-gradient(135deg, var(--bg), var(--bg2));
        color: var(--text);
        font-family: Inter, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }

      body::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          radial-gradient(circle, rgba(16, 231, 255, 0.16) 1px, transparent 1.5px);
        background-size: 48px 48px;
        opacity: 0.55;
      }

      body::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(transparent 96%, rgba(0, 214, 255, 0.08) 100%),
          linear-gradient(90deg, transparent 96%, rgba(0, 214, 255, 0.08) 100%);
        background-size: 120px 120px;
        mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.05));
      }

      .frame {
        position: relative;
        width: 100%;
        height: 100%;
        padding: 48px 64px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 18px;
        margin-bottom: 52px;
      }

      .brand-icon {
        width: 84px;
        height: 84px;
        border-radius: 22px;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, rgba(6, 15, 31, 0.95), rgba(11, 24, 44, 0.95));
        border: 1px solid rgba(0, 180, 255, 0.28);
        box-shadow: 0 0 0 1px rgba(16, 231, 255, 0.1) inset;
      }

      .brand svg {
        width: 54px;
        height: 54px;
        stroke: var(--cyan);
        fill: none;
        stroke-width: 11;
        stroke-linecap: square;
        filter: drop-shadow(0 0 9px rgba(16, 231, 255, 0.35));
      }

      .brand-text {
        font-size: 34px;
        font-weight: 800;
        letter-spacing: 0.08em;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 20px;
        color: var(--cyan);
        font-size: 19px;
        font-weight: 700;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      .eyebrow::before {
        content: "";
        width: 56px;
        height: 2px;
        background: linear-gradient(90deg, transparent, var(--cyan));
      }

      h1 {
        margin: 0;
        max-width: 980px;
        font-size: 88px;
        line-height: 0.92;
        letter-spacing: -0.04em;
        font-weight: 900;
        text-transform: uppercase;
      }

      h1 .accent {
        color: #25d6ff;
      }

      .subtitle {
        margin-top: 24px;
        max-width: 860px;
        color: var(--muted);
        font-size: 30px;
        line-height: 1.25;
        letter-spacing: 0.01em;
      }

      .footer {
        position: absolute;
        left: 64px;
        right: 64px;
        bottom: 40px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        padding: 14px 18px;
        border-radius: 999px;
        background: rgba(8, 19, 36, 0.82);
        border: 1px solid rgba(0, 180, 255, 0.2);
        color: var(--cyan);
        font-size: 17px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .url {
        color: rgba(244, 247, 251, 0.78);
        font-size: 22px;
        letter-spacing: 0.04em;
      }

      .glow-ring {
        position: absolute;
        width: 460px;
        height: 460px;
        right: -90px;
        bottom: -120px;
        border-radius: 50%;
        border: 1px solid rgba(0, 180, 255, 0.16);
        box-shadow:
          0 0 0 56px rgba(0, 180, 255, 0.03),
          0 0 0 112px rgba(0, 180, 255, 0.02);
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="brand">
        <div class="brand-icon" aria-hidden="true">
          <svg viewBox="0 0 64 64">
            <path d="M12 15 L27 32 L12 49" />
            <path d="M35 43 L52 43" />
          </svg>
        </div>
        <div class="brand-text">M.SHUFF_</div>
      </div>

      <div class="eyebrow">System Initialization Complete</div>
      <h1>Michael <span class="accent">Shuff</span></h1>
      <div class="subtitle">
        Staff Systems Architect | AI Safeguards &amp; Adversarial Research
      </div>

      <div class="footer">
        <div class="pill">Portfolio</div>
        <div class="url">mjshuff23.github.io</div>
      </div>

      <div class="glow-ring" aria-hidden="true"></div>
    </div>
  </body>
</html>
