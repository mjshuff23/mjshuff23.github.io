name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "artifacts/portfolio/**"
      - ".github/workflows/deploy-portfolio.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build portfolio
        env:
          PORT: "3000"
          BASE_PATH: "/"
          NODE_ENV: production
        run: pnpm --filter @workspace/portfolio run build

      - name: Deploy to mjshuff23/mjshuff23.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.GH_PAT }}
          external_repository: mjshuff23/mjshuff23.github.io
          publish_branch: main
          publish_dir: ./artifacts/portfolio/dist/public
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "Deploy portfolio build — ${{ github.sha }}"
          force_orphan: false
